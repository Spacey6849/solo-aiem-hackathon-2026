version: '3.8'
services:
  responder-server:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
    restart: unless-stopped

  signaling-server:
    build: .
    ports:
      - "8081:8081"
    command: ["node", "signaling-server.js"]
    restart: unless-stopped
