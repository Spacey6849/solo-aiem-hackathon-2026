// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

// Windows MAX_PATH fix: redirect all non-app subproject build dirs to a short
// path so codegen-generated .cpp files land under D:\b\<module>\ instead of
// the deep node_modules path. CMake embeds the absolute source path in every
// object filename, so shortening the source location keeps the combined ninja
// object path under 260 chars. We stay on D: (same drive as source) so that
// Gradle's Path.relativize() can compute relative paths without hitting the
// "different roots" error thrown for cross-drive relativization.
subprojects {
  if (project.path != ':app') {
    buildDir = "D:/b/${project.name}"
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
